        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>

      </span>
    </a>

  <div class="sync-status" id="syncStatus">
    <div class="sync-dot"></div>
    <span id="syncText">Синхронизация...</span>
  </div>

  <div class="xp-toast" id="xpToast">
    <span class="xp-toast-icon">⚡</span>
    <span id="xpToastText">+10 XP</span>
  </div>

  <div id="app"></div>

  <button class="scroll-top-btn" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <a class="tabbar-btn" data-view="habits" onclick="navTo('habits')">

    <a class="tabbar-btn" data-view="ideas" onclick="navTo('ideas')">
